services:
  demo:
  wms:
    md:
      title: MyMapProxy
      abstract: MapProxy with Google Maps
  wmts:
  tms:

layers:
  - name: osm
    title: OpenStreetMap
    sources: [osm_cache]

caches:
  osm_cache:
    grids: [webmercator]
    sources: [osm_source]
    cache:
      type: file
      directory: ./cache_data/osm

sources:
  osm_source:
    type: tile
    url: https://tile.openstreetmap.org/%(tms_path)s.png
    grid: webmercator
    http:
      headers:
        User-Agent: MapProxy/mymapproxy
    on_error:
      other:
        response: transparent
        cache: false

grids:
  webmercator:
    base: GLOBAL_WEBMERCATOR

globals:
  cache:
    base_dir: ./cache_data
    lock_dir: ./cache_data/locks
  http:
    client_timeout: 60
